<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Ughelli Hotels - Book Direct</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 16px;
            padding-bottom: 80px;
        }
        .header {
            margin-bottom: 20px;
        }
        .header h1 {
            color: #6200EE;
            font-size: 28px;
            font-weight: 700;
        }
        .header p {
            color: #666;
            font-size: 16px;
            margin-top: 4px;
        }
        .search-bar {
            background: white;
            padding: 12px 16px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-bar span {
            font-size: 20px;
        }
        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            background: transparent;
        }
        .filter-section {
            background: white;
            padding: 12px;
            border-radius: 16px;
            margin: 12px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-group {
            flex: 1;
            min-width: 120px;
        }
        .filter-group label {
            font-size: 12px;
            color: #666;
            display: block;
            margin-bottom: 4px;
        }
        .filter-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        .reset-filters {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            color: #6200EE;
            font-weight: 500;
        }
        .featured-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0 12px 0;
        }
        .featured-title h2 {
            font-size: 20px;
            font-weight: 600;
        }
        .featured-title span {
            color: #6200EE;
            font-size: 14px;
        }
        .featured-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 4px 0 12px 0;
            scrollbar-width: none;
        }
        .featured-scroll::-webkit-scrollbar {
            display: none;
        }
        .featured-card {
            min-width: 160px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .featured-card:active {
            transform: scale(0.98);
        }
        .featured-img {
            height: 120px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .sponsored-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #FFD700;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .featured-info {
            padding: 12px;
        }
        .featured-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        .featured-info .price {
            color: #6200EE;
            font-weight: 600;
            font-size: 14px;
        }
        .hotel-card {
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .hotel-img {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .featured-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #6200EE;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .hotel-details {
            padding: 16px;
        }
        .hotel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .hotel-header h3 {
            font-size: 20px;
            font-weight: 600;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #4CAF50;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .location {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .price {
            font-size: 18px;
            font-weight: 700;
            color: #6200EE;
            margin: 12px 0;
        }
        .amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .amenity {
            background: #f0f0f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .hotel-whatsapp {
            background: #e8f5e9;
            padding: 10px 12px;
            border-radius: 12px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .hotel-whatsapp span:first-child {
            color: #2e7d32;
            font-weight: 500;
        }
        .hotel-whatsapp-number {
            color: #25D366;
            font-weight: bold;
            font-size: 16px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
        }
        .btn-book {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn-book:active {
            background: #128C7E;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }
        .stats {
            background: #e8e8e8;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            display: inline-block;
            margin: 8px 0;
        }
        .sticky-whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        .whatsapp-button {
            background: #25D366;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .whatsapp-button:active {
            transform: scale(0.97);
        }
        .whatsapp-button span:first-child {
            font-size: 28px;
        }
        .whatsapp-text {
            display: flex;
            flex-direction: column;
        }
        .whatsapp-label {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
        }
        .whatsapp-number {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
        @media (max-width: 480px) {
            .whatsapp-button {
                padding: 10px 16px;
            }
            .whatsapp-number {
                font-size: 14px;
            }
        }
    </style>

        // ============================================

        function displayFeaturedHotels() {
            const featured = hotels.filter(h => h.isFeatured);
            const container = document.getElementById('featuredScroll');
            if (!container) return;
            container.innerHTML = '';
            if (featured.length === 0) {
                container.innerHTML = '<div style="padding: 20px;">No featured hotels</div>';
                return;
            }
            featured.forEach(hotel => {
                const card = document.createElement('div');
                card.className = 'featured-card';
                card.onclick = () => openHotelWhatsApp(hotel.whatsappNumber, hotel.name);
                card.innerHTML = `
                    <div class="featured-img" style="background-image: url('${hotel.image}')">
                        ${hotel.isSponsored ? '<div class="sponsored-badge">SPONSORED</div>' : ''}
                    </div>
                    <div class="featured-info">
                        <h3>${hotel.name}</h3>
                        <div class="price">${hotel.priceRange}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openHotelWhatsApp(number, hotelName) {
            const message = encodeURIComponent(`Hello, I'm interested in booking a room at ${hotelName}. Do you have availability?`);
            window.open(`https://wa.me/${number}?text=${message}`, '_blank');
        }

        function displayHotels() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';
            const priceFilter = document.getElementById('priceFilter')?.value || 'all';
            const ratingFilter = document.getElementById('ratingFilter')?.value || 'all';
            
            let filtered = [...hotels];
            if (searchTerm !== '') {
                filtered = filtered.filter(hotel => 
                    hotel.name.toLowerCase().includes(searchTerm) ||
                    hotel.location.toLowerCase().includes(searchTerm)
                );
            }
            if (priceFilter !== 'all') {
                filtered = filtered.filter(hotel => {
                    if (priceFilter === 'budget') return hotel.priceMax <= 20000;
                    if (priceFilter === 'mid') return hotel.priceMin >= 20000 && hotel.priceMin <= 35000;
                    if (priceFilter === 'luxury') return hotel.priceMin >= 35000;
                    return true;
                });
            }
            if (ratingFilter !== 'all') {
                const minRating = parseInt(ratingFilter);
                filtered = filtered.filter(hotel => hotel.rating >= minRating);
            }
            
            document.getElementById('hotelCount').innerText = `${filtered.length} hotels`;
            const container = document.getElementById('hotelsContainer');
            if (!container) return;
            container.innerHTML = '';
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-results">😔 No hotels match your filters.</div>';
                return;
            }
            
            filtered.forEach(hotel => {
                const card = document.createElement('div');
                card.className = 'hotel-card';
                const amenitiesHtml = hotel.amenities.slice(0, 5).map(a => `<span class="amenity">${a}</span>`).join('');
                card.innerHTML = `
                    <div class="hotel-img" style="background-image: url('${hotel.image}')">
                        ${hotel.isFeatured ? '<div class="featured-badge">FEATURED</div>' : ''}
                    </div>
                    <div class="hotel-details">
                        <div class="hotel-header">
                            <h3>${hotel.name}</h3>
                            <div class="rating">⭐ ${hotel.rating} (${hotel.ratingCount})</div>
                        </div>
                        <div class="location">📍 ${hotel.location}</div>
                        <div class="amenities">${amenitiesHtml}</div>
                        <div class="price">${hotel.priceRange} / night</div>
                        <p style="color: #444; margin: 12px 0;">${hotel.description}</p>
                        <div class="hotel-whatsapp">
                            <span>📞 WhatsApp:</span>
                            <span class="hotel-whatsapp-number">${hotel.whatsappDisplay}</span>
                        </div>
                        <button class="btn-book" onclick="openHotelWhatsApp('${hotel.whatsappNumber}', '${hotel.name}')">
                            💬 Book Now on WhatsApp
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('priceFilter').value = 'all';
            document.getElementById('ratingFilter').value = 'all';
            displayHotels();
        }

        document.getElementById('searchInput')?.addEventListener('input', displayHotels);
        document.getElementById('priceFilter')?.addEventListener('change', displayHotels);
        document.getElementById('ratingFilter')?.addEventListener('change', displayHotels);

        displayFeaturedHotels();
        displayHotels();
